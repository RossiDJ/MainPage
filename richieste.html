<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiedi la tua Canzone - Rossi DJ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('flx10live1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f0f0f;
            color: #ffffff;
        }
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            text-align: center;
            border-bottom: 2px solid #00d4ff;
            z-index: 20;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #00d4ff; text-transform: uppercase; }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .bottone-pagine {
            display: inline-block;
            padding: 10px 25px;
            background-color: #00d4ff; 
            color: #000; 
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        
        .bottone-pagine:hover { transform: scale(1.05); }

        .container-form {
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 20px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #00d4ff; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .bottone-invia {
            width: 100%;
            padding: 15px;
            background-color: #00d4ff; 
            color: #000; 
            border: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #successMessage { display: none; color: #00d4ff; font-weight: bold; padding: 20px; }

        footer {
            padding: 15px;
            font-size: 0.9rem;
            color: #eee;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1>🎵 Richiedi la tua Canzone</h1>
            <div class="nav-buttons">
                <a href="index.html" class="bottone-pagine">🏠 Home</a>
                <a href="eventi.html" class="bottone-pagine">📅 Eventi</a>
            </div>
        </header>

        <div style="flex-grow: 1; display: flex; align-items: center; width: 100%;">
            <div class="container-form">
                <form id="requestForm" action="https://docs.google.com/forms/d/e/1FAIpQLScxub9hw5QXmbeEFm3kWBbiOWi9VLIhhCfEIST6C_7cZMNeSQ/formResponse" method="POST">
                    <div class="form-group">
                        <label>Artista</label>
                        <input type="text" name="entry.272795737" placeholder="Esempio: Gigi D'Agostino" required>
                    </div>
                    <div class="form-group">
                        <label>Titolo della Canzone</label>
                        <input type="text" name="entry.288440619" placeholder="Esempio: L'Amour Toujours" required>
                    </div>
                    <button type="submit" class="bottone-invia">INVIA RICHIESTA</button>
                </form>
                <div id="successMessage">
                    <i class="fas fa-check-circle" style="font-size: 2rem;"></i><br><br>
                    Richiesta inviata al Foglio Google!
                </div>
            </div>
        </div>

        <footer>&copy; 2026 Rossi DJ</footer>
    </div>

    <script>
        const form = document.getElementById('requestForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            btn.innerText = "INVIANDO...";
            
            // Invia i dati a Google in background
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                mode: 'no-cors'
            });

            // Mostra il messaggio di successo subito
            form.style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        };
    </script>
</body>
</html>
