<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiedi la tua Canzone - Rossi DJ</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('flx10live1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f0f0f;
            color: #ffffff;
        }
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            text-align: center;
            border-bottom: 2px solid #00d4ff;
            position: relative;
            z-index: 20;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #00d4ff; }
        
        /* Contenitore per i bottoni nell'header */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .bottone-pagine {
            display: inline-block;
            padding: 10px 25px;
            background-color: #00d4ff; 
            color: #000; 
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .bottone-pagine:hover {
            transform: scale(1.05);
            background-color: #00b8e6;
        }

        .container {
            width: 95%;
            max-width: 700px;
            margin: 20px 0;
            flex-grow: 1;
            position: relative;
            z-index: 10;
        }
        
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            opacity: 0.85; 
            transition: opacity 0.3s ease;
        }

        iframe:hover {
            opacity: 0.95;
        }

        footer {
            padding: 15px;
            font-size: 0.9rem;
            color: #eee;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
            text-align: center;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1>🎵 Richiedi la tua Canzone</h1>
            <p style="margin: 5px 0 0; font-size: 0.9rem; color: #ccc;">Rossi DJ @ Legnaro</p>
            
            <div class="nav-buttons">
                <a href="index.html" class="bottone-pagine">🏠 Home</a>
                <a href="eventi.html" class="bottone-pagine">📅 Eventi</a>
            </div>
        </header>

        <div class="container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScxub9hw5QXmbeEFm3kWBbiOWi9VLIhhCfEIST6C_7cZMNeSQ/viewform?embedded=true">Caricamento…</iframe> 
        </div>

        <footer>
            &copy; 2026 Rossi DJ - Musica su misura per te
        </footer>
    </div>
</body>
</html>
