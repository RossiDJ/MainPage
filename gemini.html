<div class="container">
    <form action="INCOLLA_QUI_IL_TUO_URL" method="POST" id="requestForm">
        <div class="form-group">
            <label for="artista">Artista</label>
            <input type="text" id="artista" name="artista" placeholder="Esempio: Gigi D'Agostino" required>
        </div>
        <div class="form-group">
            <label for="titolo">Titolo della Canzone</label>
            <input type="text" id="titolo" name="titolo" placeholder="Esempio: L'Amour Toujours" required>
        </div>
        <button type="submit" class="bottone-invia">INVIA RICHIESTA</button>
    </form>
    <div id="successMessage" style="display:none; color: #00d4ff; margin-top: 20px; font-weight: bold;">
        ✅ Richiesta inviata con successo!
    </div>
</div>

<script>
// Questo piccolo script serve a non far cambiare pagina dopo l'invio
const form = document.getElementById('requestForm');
form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = form.querySelector('button');
    btn.innerText = "INVIANDO...";
    
    const formData = new FormData(form);
    await fetch(form.action, {
        method: 'POST',
        body: formData,
        mode: 'no-cors' 
    });
    
    form.style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';
};
</script>
