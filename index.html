<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rossi DJ - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('flx10live1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 20px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        
        h1 { color: #00d4ff; text-transform: uppercase; }
        
        .bottone-pagine {
            display: inline-block;
            margin: 10px 0;
            padding: 15px 40px;
            background-color: #00d4ff; 
            color: #000; 
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: transform 0.2s;
            min-width: 250px;
        }
        
        .bottone-pagine:hover {
            transform: scale(1.05);
            background-color: #00b8e6;
        }

        /* Nuova Sezione Social */
        .social-section {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icon {
            font-size: 2rem;
            color: #ffffff;
            transition: color 0.3s, transform 0.2s;
            text-decoration: none;
        }

        .social-icon:hover {
            color: #00d4ff;
            transform: translateY(-3px);
        }

        .social-icon.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .contact-info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #e0e0e0;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .contact-info a {
            color: #20c997; 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.2s;
        }

        .contact-info a:hover {
            color: #00d4ff; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rossi DJ a Legnaro</h1>
        <p>Esperienze sonore uniche per ogni evento, dal locale alla festa privata.</p>

        <a href="eventi.html" class="bottone-pagine">
            📅 PROSSIMI EVENTI
        </a>
        <br>
        <a href="richieste.html" class="bottone-pagine">
            🎵 RICHIEDI UNA CANZONE
        </a>

        <div class="social-section">
            <a href="https://www.facebook.com/share/1HtZxnxUDJ/" target="_blank" class="social-icon" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="#" class="social-icon disabled" title="Instagram (Presto disponibile)">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="contact-info">
            <div>Email: <a href="mailto:RossiDJ@live.it">RossiDJ@live.it</a></div>
            <div>Tel: +39 3466045298</div>
        </div>
    </div>

</body>
</html>
