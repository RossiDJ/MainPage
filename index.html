<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RossiDJ - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            /* Evita la comparsa di barre di scorrimento durante lo zoom */
            overflow: hidden; 
        }

        /* --- INIZIO EFFETTO SFONDO ANIMATO --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('flx10live1.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1; /* Mantiene l'immagine dietro a tutti i contenuti */
            /* Animazione: durata 20s, fluida, ciclica e alternata (zoom in / zoom out) */
            animation: respiroSfondo 20s ease-in-out infinite alternate;
        }

        @keyframes respiroSfondo {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); } /* Ingrandisce dolcemente l'immagine del 15% */
        }
        /* --- FINE EFFETTO SFONDO ANIMATO --- */
        
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 20px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            /* Assicura che il contenitore stia sempre sopra lo sfondo animato */
            position: relative; 
            z-index: 1;
        }
        
        h1 { color: #00d4ff; text-transform: uppercase; }
        
        .bottone-pagine {
            display: inline-block;
            margin: 10px 0;
            padding: 15px 40px;
            background-color: #00d4ff; 
            color: #000; 
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: transform 0.2s, background-color 0.2s;
            min-width: 250px;
        }
        
        .bottone-pagine:hover {
            transform: scale(1.05);
            background-color: #00b8e6;
        }

        /* Classe per far risaltare il pulsante della Live Chat */
        .bottone-live {
            background-color: #ff0055;
            color: #ffffff;
            border: 2px solid #ff0055;
        }
        
        .bottone-live:hover {
            background-color: #cc0044;
            color: #ffffff;
        }

        .social-section {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icon {
            font-size: 2rem;
            color: #ffffff;
            transition: color 0.3s, transform 0.2s;
            text-decoration: none;
        }

        .social-icon:hover {
            color: #00d4ff;
            transform: translateY(-3px);
        }

        .contact-info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #e0e0e0;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .contact-info a {
            color: #20c997; 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.2s;
        }

        .contact-info a:hover {
            color: #00d4ff; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RossiDJ</h1>
        <p>Esperienze sonore uniche e dedicate per ogni evento, dal locale alla festa privata.</p>

        <a href="live-chat.html" class="bottone-pagine bottone-live">
            🔴 ENTRA NELLA LIVE CHAT
        </a>
        <br>
        <a href="richieste.html" class="bottone-pagine">
            🎵 RICHIEDI UNA CANZONE
        </a>
        <br>
        <a href="eventi.html" class="bottone-pagine">
            📅 PROSSIMI EVENTI
        </a>
        <br>
        <a href="galleria.html" class="bottone-pagine" style="background-color: #9900ff; color: #fff;">
            📸 GALLERIA FOTO & VIDEO
        </a>
        <br>
        <a href="prenotazioni.html" class="bottone-pagine">
            🎉 PRENOTA IL TUO EVENTO
        </a>

        <div class="social-section">
            <a href="https://www.facebook.com/share/1HtZxnxUDJ/" target="_blank" class="social-icon" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.instagram.com/rossiddj/" target="_blank" class="social-icon" title="Instagram (Presto disponibile)">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="contact-info">
            <div>Email: <a href="mailto:RossiDJ@live.it">RossiDJ@live.it</a></div>
            <div>Tel: +39 3466045298</div>
        </div>
    </div>

</body>
</html>
