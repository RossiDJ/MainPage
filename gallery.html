<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rossi DJ - Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('flx10live1.jpg'); /* Stesso sfondo della home */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 30px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #00d4ff;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Stile Griglia degli Album */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            text-decoration: none;
            display: block;
            color: white;
        }

        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .album-cover {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid #333;
            transition: border-color 0.3s;
        }

        .album-card:hover .album-cover {
            border-color: #00d4ff;
        }

        .album-info {
            padding: 15px;
            text-align: center;
        }

        .album-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
        }

        .album-card:hover .album-title {
            color: #00d4ff;
        }

        .icona-cartella {
            font-size: 2.5rem;
            color: #00d4ff;
            margin-bottom: 10px;
            display: block;
        }

        /* Tasto Indietro */
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background-color: #00d4ff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Torna alla Home</a>
        
        <h1>📸 Gallery Eventi</h1>

        <div class="album-grid" id="galleria-album">
            </div>
    </div>

    <script>
        /* IMPOSTAZIONI DEGLI ALBUM
           Qui è dove "colleghi" le tue cartelle. 
           Per ogni evento, scrivi il Titolo, il nome esatto della cartella dentro "foto", 
           e il percorso della foto di copertina.
        */
        const albumData = [
            {
                titolo: "Festa in Spiaggia 2024",
                cartella: "spiaggia_24", // Nome della cartella dentro "foto/"
                copertina: "foto/spiaggia_24/cover.jpg" // Immagine principale
            },
            {
                titolo: "Capodanno Exclusive",
                cartella: "capodanno_2024",
                copertina: "foto/capodanno_2024/cover.jpg"
            },
            {
                titolo: "Private Party Milano",
                cartella: "private_milano",
                copertina: "foto/private_milano/cover.jpg"
            }
            // Puoi aggiungere infiniti album copiando il blocco sopra e mettendo una virgola
        ];

        const contenitoreAlbum = document.getElementById('galleria-album');

        albumData.forEach(album => {
            const card = document.createElement('a');
            
            // Questo link rimanderà a una pagina futura (es. visualizza_foto.html) 
            // passandogli il nome della cartella da aprire.
            card.href = `visualizza_foto.html?album=${album.cartella}`; 
            card.className = 'album-card';

            // Il tag onerror inserisce un'immagine grigia di default se ti dimentichi di mettere la foto cover.jpg nella cartella
            card.innerHTML = `
                <img src="${album.copertina}" alt="${album.titolo}" class="album-cover" onerror="this.src='https://via.placeholder.com/300x160/222/00d4ff?text=Nessuna+Copertina'">
                <div class="album-info">
                    <i class="fas fa-folder icona-cartella"></i>
                    <h3 class="album-title">${album.titolo}</h3>
                </div>
            `;

            contenitoreAlbum.appendChild(card);
        });
    </script>

</body>
</html>
