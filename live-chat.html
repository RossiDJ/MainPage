<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Rossi DJ</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; color: #fff; }
        .bg-animato { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url('flx10live1.jpg'); background-size: cover; background-position: center; z-index: 0; animation: respiroSfondo 20s ease-in-out infinite alternate; }
        @keyframes respiroSfondo { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .page-overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
        header { width: 100%; padding: 20px 0; background: rgba(0,0,0,0.85); text-align: center; border-bottom: 2px solid #ff0055; }
        .container { width: 90%; max-width: 550px; margin: 30px 10px; background: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 20px; border: 2px solid #ff0055; height: 75vh; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 15px; margin-bottom: 10px; }
        .msg { background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #00d4ff; }
        .btn-verifica { background: #888; color: #fff; padding: 15px; border-radius: 20px; border: none; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-verifica:disabled { cursor: not-allowed; opacity: 0.8; }
        #input-area { display: none; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="bg-animato"></div>
<div class="page-overlay">
    <header><h1>LIVE CHAT</h1></header>
    <div class="container">
        <div id="messages"></div>
        
        <div id="verifica-container">
            <div id="form-attivazione">
                <input type="text" id="nick-scelto" placeholder="Inserisci un nickname per attivare la chat" style="padding:10px; width:95%; border-radius:10px; border:none; margin-bottom:10px;">
                <button id="btn-attivazione" onclick="inviaRichiestaWhatsApp()" class="btn-verifica" disabled>Minimo 3 caratteri</button>
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Scrivi messaggio..." style="flex-grow:1; padding:10px; border-radius:10px; border:none;">
            <button id="sendBtn" style="background:#ff0055; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">INVIA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAXFX5kkba800EX9lowCg3os6Ifn2rzd8M",
        authDomain: "rossidj-chat.firebaseapp.com",
        databaseURL: "https://rossidj-chat-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rossidj-chat",
        storageBucket: "rossidj-chat.firebasestorage.app",
        messagingSenderId: "247840582286",
        appId: "1:247840582286:web:5320cff622ffc8ab9377df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const nomiRegistrati = new Set(); // Memoria dei nomi già presi
    const nickInput = document.getElementById('nick-scelto');
    const btnAttivazione = document.getElementById('btn-attivazione');

    // Carica messaggi immediatamente e salva i nomi usati
    onChildAdded(ref(db, 'messages'), (snapshot) => {
        const data = snapshot.val();
        if(data.user) {
            nomiRegistrati.add(data.user.toLowerCase()); // Salva il nome in minuscolo per il controllo
        }
        
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<strong>${data.user}</strong>: ${data.text}`;
        const msgDiv = document.getElementById('messages');
        msgDiv.appendChild(div);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });

    // Controllo live del Nickname mentre si digita
    nickInput.addEventListener('input', () => {
        const nick = nickInput.value.trim();
        const nickLower = nick.toLowerCase();

        if (nick.length < 3) {
            btnAttivazione.disabled = true;
            btnAttivazione.style.background = '#888';
            btnAttivazione.style.color = '#fff';
            btnAttivazione.innerText = 'Minimo 3 caratteri';
        } else if (nomiRegistrati.has(nickLower)) {
            btnAttivazione.disabled = true;
            btnAttivazione.style.background = '#ff0055'; // Rosso
            btnAttivazione.style.color = '#fff';
            btnAttivazione.innerText = '❌ Nome non disponibile';
        } else {
            btnAttivazione.disabled = false;
            btnAttivazione.style.background = '#00ff00'; // Verde
            btnAttivazione.style.color = '#000';
            btnAttivazione.innerText = 'Attiva per commentare ✅';
        }
    });

    // Sblocco se l'utente arriva dal link verificato di WhatsApp
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('verified') === 'true') {
        document.getElementById('verifica-container').style.display = 'none';
        document.getElementById('input-area').style.display = 'flex';
    }

    // Invia la richiesta via WhatsApp
    window.inviaRichiestaWhatsApp = () => {
        const nick = nickInput.value.trim();
        if(!btnAttivazione.disabled && nick.length >= 3) {
            window.open(`https://wa.me/393466045298?text=Verifica:%20${encodeURIComponent(nick)}`, '_blank');
        }
    };

    // Invio dei messaggi effettivi nella chat
    document.getElementById('sendBtn').addEventListener('click', () => {
        const msg = document.getElementById('messageInput').value;
        const nick = urlParams.get('user'); // Recupera il nick concesso da WhatsApp
        if(msg && nick) {
            push(ref(db, 'messages'), { user: nick, text: msg, timestamp: Date.now() });
            document.getElementById('messageInput').value = '';
        }
    });

    // Consente l'invio col tasto Invio
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
</script>
</body>
</html>
