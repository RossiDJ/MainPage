<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventi - Rossi DJ</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url('flx10live1.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; color: #fff;
        }
        .page-overlay {
            background: rgba(0, 0, 0, 0.65);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        header {
            width: 100%; padding: 20px 0; background: #000;
            text-align: center; border-bottom: 2px solid #00d4ff;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-buttons { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .bottone-pagine {
            padding: 10px 25px; background: #00d4ff; color: #000;
            text-decoration: none; font-weight: bold; border-radius: 50px;
            cursor: pointer; border: none; font-size: 0.9rem; transition: 0.3s;
        }
        .bottone-pagine:hover { transform: scale(1.05); background-color: #00b8e6; }

        .container {
            width: 90%; max-width: 550px; margin: 30px 10px;
            background: rgba(0, 0, 0, 0.9); padding: 25px; border-radius: 20px;
            border: 2px solid #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .admin-section { padding-bottom: 20px; border-bottom: 1px solid #444; margin-bottom: 25px; }
        .hidden { display: none !important; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #555; background: #222; color: #fff; }

        .evento-card {
            background: rgba(255, 255, 255, 0.05); padding: 18px;
            border-radius: 15px; border-left: 6px solid #00d4ff; margin-bottom: 18px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .evento-info { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .evento-data { color: #00d4ff; font-weight: bold; font-size: 1.2rem; }
        .evento-luogo { color: #ddd; font-size: 1rem; }
        
        .btn-link {
            display: inline-block; padding: 8px 15px; background: transparent;
            color: #00d4ff; border: 2px solid #00d4ff; text-decoration: none;
            border-radius: 10px; font-size: 0.85rem; font-weight: bold;
            margin-top: 10px; transition: 0.3s; width: fit-content;
        }
        .btn-link:hover { background: #00d4ff; color: #000; }

        .btn-elimina { background: #ff4d4d; color: #fff; border: none; padding: 10px; border-radius: 10px; cursor: pointer; display: none; margin-left: 10px; font-size: 1.2rem; }
        .gestione-attiva .btn-elimina { display: block; }

        .video-box { margin-top: 30px; text-align: center; border-top: 1px solid #444; padding-top: 20px; }
        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            border-radius: 15px; border: 2px solid #00d4ff; margin-top: 15px;
        }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body id="main-body">
    <div class="page-overlay">
        <header>
            <h1 style="color:#00d4ff; margin:0;">🎧 EVENTI & PROMO</h1>
            <div class="nav-buttons">
                <a href="index.html" class="bottone-pagine">🏠 Home</a>
                <a href="richieste.html" class="bottone-pagine">🎶 Richieste</a>
            </div>
        </header>

        <div class="container">
            <div id="login-area" class="admin-section">
                <h3 style="color:#00d4ff; margin-top:0;">Area Riservata DJ</h3>
                <div class="form-group">
                    <input type="password" id="passInput" placeholder="Password">
                    <button onclick="sblocca()" class="bottone-pagine">ACCEDI</button>
                </div>
            </div>

            <div id="menu-area" class="admin-section hidden">
                <h3 style="color:#00d4ff; margin-top:0;">Nuovo Evento</h3>
                <div class="form-group">
                    <input type="text" id="dataE" placeholder="Quando? (es. Sabato 20/04)">
                    <input type="text" id="luogoE" placeholder="Dove?">
                    <input type="text" id="linkE" placeholder="Link Mappa (Opzionale)">
                    <button onclick="aggiungi()" id="btn-aggiungi" class="bottone-pagine">PUBBLICA</button>
                    <button onclick="chiudi()" style="background:none; color:#ff4d4d; border:none; cursor:pointer;">Esci</button>
                </div>
            </div>

            <div id="lista-eventi">
                <p>Caricamento eventi...</p>
            </div>

            <div class="video-box">
                <h3 style="color:#00d4ff;">🎬 PROMO REEL</h3>
                <div class="video-container">
                    <video controls autoplay playsinline muted loop>
                         <source src="promo.mp4" type="video/mp4">
                         Il tuo browser non supporta il formato video.
                    </video>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyLQcF5MEC_SdK5Lhg8gaAK-QoJ5IQh2HjEJEfXL4SYQJwTMi8klmwca9luhvpAom3B/exec'; 

        async function caricaEventi() {
            try {
                const response = await fetch(SCRIPT_URL);
                const eventi = await response.json();
                const lista = document.getElementById('lista-eventi');
                lista.innerHTML = ''; 
                
                // .slice(1) esclude la riga delle intestazioni del foglio
                const eventiValidi = eventi.slice(1);

                if (eventiValidi.length === 0) {
                    lista.innerHTML = '<p style="text-align:center; color:#888;">Nessun evento in programma.</p>';
                    return;
                }

                eventiValidi.forEach((ev, index) => {
                    // La riga reale nel foglio è l'indice attuale + 2 
                    // (+1 perché JS parte da 0 e +1 perché abbiamo saltato la prima riga)
                    const rigaFisica = index + 2; 
                    
                    const d = ev[0]; 
                    const l = ev[1]; 
                    const lnk = ev[2]; 
                    
                    const card = document.createElement('div');
                    card.className = 'evento-card';
                    
                    let linkHTML = '';
                    if(lnk && lnk.toString().trim().length > 1) {
                        const cleanLink = lnk.toString().startsWith('http') ? lnk : `https://${lnk}`;
                        linkHTML = `<a href="${cleanLink}" target="_blank" class="btn-link">📍 Info / Mappa</a>`;
                    }

                    card.innerHTML = `
                        <div class="evento-info">
                            <span class="evento-data">${d}</span>
                            <span class="evento-luogo">${l}</span>
                            ${linkHTML}
                        </div>
                        <button class="btn-elimina" onclick="eliminaEvento(${rigaFisica})">🗑️</button>
                    `;
                    lista.appendChild(card);
                });
            } catch (e) {
                document.getElementById('lista-eventi').innerHTML = "Errore di caricamento.";
            }
        }

        window.onload = caricaEventi;

        function sblocca() {
            if(document.getElementById('passInput').value === 'Screb/735') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('menu-area').classList.remove('hidden');
                document.getElementById('main-body').classList.add('gestione-attiva');
            } else { alert('Password Errata!'); }
        }

        async function aggiungi() {
            const d = document.getElementById('dataE').value;
            const l = document.getElementById('luogoE').value;
            const lnk = document.getElementById('linkE').value;
            if(!d || !l) return alert('Inserisci almeno Data e Luogo!');
            
            const btn = document.getElementById('btn-aggiungi');
            btn.innerText = "INVIO...";
            btn.disabled = true;

            try {
                const url = `${SCRIPT_URL}?action=add&dataE=${encodeURIComponent(d)}&luogoE=${encodeURIComponent(l)}&linkE=${encodeURIComponent(lnk)}`;
                await fetch(url, { mode: 'no-cors' });
                alert("Evento aggiunto!");
                location.reload();
            } catch (error) {
                alert('Errore di connessione.');
                btn.innerText = "PUBBLICA";
                btn.disabled = false;
            }
        }

        async function eliminaEvento(riga) {
            if(!confirm("Vuoi eliminare questo evento definitivamente dal foglio?")) return;
            
            try {
                const url = `${SCRIPT_URL}?action=delete&row=${riga}`;
                await fetch(url, { mode: 'no-cors' });
                alert("Evento eliminato!");
                location.reload();
            } catch (error) {
                alert('Errore durante l\'eliminazione.');
            }
        }

        function chiudi() {
            document.getElementById('login-area').classList.remove('hidden');
            document.getElementById('menu-area').classList.add('hidden');
            document.getElementById('main-body').classList.remove('gestione-attiva');
        }
    </script>
</body>
</html>
